<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" shape-rendering="crispEdges">
  <rect width="16" height="16" rx="2.5" fill="#1a1a2e"/>

  <!-- 3 pixel-art claw scratches — fan out from top (paw swipe) -->

  <!-- Left scratch (starts near center, curves outward left) -->
  <rect x="5" y="2" width="1" height="1" fill="#e0e7ff"/>
  <rect x="5" y="3" width="1" height="1" fill="#c7d2fe"/>
  <rect x="4" y="4" width="1" height="1" fill="#c7d2fe"/>
  <rect x="4" y="5" width="1" height="1" fill="#a5b4fc"/>
  <rect x="3" y="6" width="1" height="1" fill="#a5b4fc"/>
  <rect x="3" y="7" width="1" height="1" fill="#818cf8"/>
  <rect x="3" y="8" width="1" height="1" fill="#818cf8"/>
  <rect x="2" y="9" width="1" height="1" fill="#6366f1"/>
  <rect x="2" y="10" width="1" height="1" fill="#6366f1"/>
  <rect x="1" y="11" width="1" height="1" fill="#4f46e5"/>
  <rect x="1" y="12" width="1" height="1" fill="#4f46e5"/>

  <!-- Center scratch (straight down, 2px wide) -->
  <rect x="7" y="2" width="2" height="1" fill="#e0e7ff"/>
  <rect x="7" y="3" width="2" height="1" fill="#c7d2fe"/>
  <rect x="7" y="4" width="2" height="1" fill="#c7d2fe"/>
  <rect x="7" y="5" width="2" height="1" fill="#a5b4fc"/>
  <rect x="7" y="6" width="2" height="1" fill="#a5b4fc"/>
  <rect x="7" y="7" width="2" height="1" fill="#818cf8"/>
  <rect x="7" y="8" width="2" height="1" fill="#818cf8"/>
  <rect x="7" y="9" width="2" height="1" fill="#6366f1"/>
  <rect x="7" y="10" width="2" height="1" fill="#6366f1"/>
  <rect x="7" y="11" width="2" height="1" fill="#4f46e5"/>
  <rect x="7" y="12" width="2" height="1" fill="#4f46e5"/>

  <!-- Right scratch (starts near center, curves outward right) -->
  <rect x="10" y="2" width="1" height="1" fill="#e0e7ff"/>
  <rect x="10" y="3" width="1" height="1" fill="#c7d2fe"/>
  <rect x="11" y="4" width="1" height="1" fill="#c7d2fe"/>
  <rect x="11" y="5" width="1" height="1" fill="#a5b4fc"/>
  <rect x="12" y="6" width="1" height="1" fill="#a5b4fc"/>
  <rect x="12" y="7" width="1" height="1" fill="#818cf8"/>
  <rect x="12" y="8" width="1" height="1" fill="#818cf8"/>
  <rect x="13" y="9" width="1" height="1" fill="#6366f1"/>
  <rect x="13" y="10" width="1" height="1" fill="#6366f1"/>
  <rect x="14" y="11" width="1" height="1" fill="#4f46e5"/>
  <rect x="14" y="12" width="1" height="1" fill="#4f46e5"/>
</svg>
